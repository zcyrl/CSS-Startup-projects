<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="To-Do.css">
</head>

<body>
     <!-- main item-->a
  <ul class="todo-list">
    <li><label for="groceries">
        <input id="groceries" type="checkbox" class="todo-item">Buy groceries</label>
    <!-- sub-item-->  
        <ul class="sub-item">
         <li>
            <a class="sub-item-link" href="https://example.com/groceries" target="_blank">
                groceries-details
            </a>
         </li>
        </ul>
    </li>
     
    <!-- main item-->
    <li><label for="walk-dog">
        <input id="walk-dog" type="checkbox" class="todo-item">Walk the dog</label>
    <!-- sub-item-->  
        <ul class="sub-item">
            <li>
                <a class="sub-item-link" href="https://example.com/walk-dog" target="_blank">
                    walk-dog-details
                </a>
            </li>
        </ul>
    </li>
    
    <!-- main item-->
    <li><label for="finish-homework">
        <input id="finish-homework" type="checkbox" class="todo-item">Finish homework</label>
    <!-- sub-item-->  
        <ul class="sub-item">
            <li>
                <a class="sub-item-link" href="https://example.com/finish-homework" target="_blank">
                    finish-homework-details
                </a>
            </li>
        </ul>
    </li>

    <!-- main item-->
    <li><label for="eat-dinner">
        <input id="eat-dinner" type="checkbox" class="todo-item">Eat dinner</label>
    <!-- sub-item-->  
        <ul class="sub-item"> 
            <li>
                <a class="sub-item-link" href="https://example.com/eat-dinner" target="_blank">
                    eat-dinner-details
                </a>
            </li>
        </ul>
    </li>

    </ul>
</body>

</html>
